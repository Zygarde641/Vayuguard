name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_vayuguard
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: cd backend && npm install

    - name: Run backend tests
      run: cd backend && npm test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: test_vayuguard
        DB_USER: test
        DB_PASSWORD: test

    - name: Install frontend dependencies
      run: cd frontend && npm install

    - name: Build frontend
      run: cd frontend && npm run build

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Build backend Docker image
      run: docker build -f docker/Dockerfile.backend -t vayuguard-backend:${{ github.sha }} .

    - name: Build frontend Docker image
      run: docker build -f docker/Dockerfile.frontend -t vayuguard-frontend:${{ github.sha }} .

    - name: Build ML Docker image
      run: docker build -f docker/Dockerfile.ml -t vayuguard-ml:${{ github.sha }} .
